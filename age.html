<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Age Verification | Project Casino</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>
    <style>
        .verification-wrapper {
            background: linear-gradient(135deg, #110505 0%, #050505 100%);
            border: 1px solid var(--neon-gold);
            border-radius: var(--border-radius-lg);
            padding: 3rem;
            max-width: 500px;
            width: 100%;
            margin: 0 auto;
            box-shadow: 0 0 50px rgba(0, 0, 0, 1), inset 0 0 20px rgba(197, 160, 89, 0.15);
            position: relative;
            z-index: 2;
            text-align: center;
        }

        .date-inputs {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin: 2rem 0;
        }

        .date-field {
            width: 30%;
            padding: 1rem 0.5rem;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(197, 160, 89, 0.3);
            border-radius: 4px;
            color: var(--neon-gold);
            font-family: var(--font-mono);
            font-size: 1.2rem;
            text-align: center;
            transition: border-color 0.3s, box-shadow 0.3s;
            outline: none;
        }

        .date-field:focus {
            border-color: var(--neon-gold);
            box-shadow: 0 0 10px rgba(197, 160, 89, 0.2);
            background: rgba(0, 0, 0, 0.6);
        }

        .error-message {
            color: var(--neon-red);
            font-size: 0.9rem;
            margin-top: -1rem;
            margin-bottom: 1rem;
            min-height: 1.2em;
        }
    </style>
</head>

<body style="display:flex; flex-direction:column; min-height:100vh;">

    <div id="bg-canvas" class="bg-animation-container"></div>

    <main class="container"
        style="flex: 1; display:flex; flex-direction:column; justify-content:center; align-items: center;">

        <div class="verification-wrapper">
            <svg class="logo-svg" viewBox="0 0 100 100" style="width:60px;height:60px; margin-bottom: 1rem;">
                <path d="M50 10 L90 50 L50 90 L10 50 Z" />
            </svg>
            <h1 class="neon-title" style="font-size: 2rem; margin-bottom: 0.5rem;" data-i18n="age.title">VERIFY YOUR AGE
            </h1>
            <p style="color: var(--text-muted); font-size: 1rem; margin-bottom: 1.5rem;" data-i18n="age.subtitle">You
                must be of legal gambling age to enter.</p>

            <form id="age-form" onsubmit="handleAgeVerification(event)">
                <div class="date-inputs">
                    <input type="number" id="dob-day" class="date-field" placeholder="DD" min="1" max="31" required />
                    <input type="number" id="dob-month" class="date-field" placeholder="MM" min="1" max="12" required />
                    <input type="number" id="dob-year" class="date-field" placeholder="YYYY" min="1900" max="2026"
                        required />
                </div>

                <div id="error-msg" class="error-message"></div>

                <button type="submit" class="btn-luxury" style="width: 100%; padding: 15px;" id="verify-btn">
                    <span class="btn-bg"></span>
                    <span data-i18n="age.submit" style="letter-spacing: 2px;">CONFIRM AGE</span>
                </button>
            </form>
        </div>
    </main>

    <footer class="main-footer"
        style="padding: 2rem; text-align: center; border-top: 1px solid rgba(197, 160, 89, 0.2);">
        <div class="copyright" data-i18n="footer.copyright" style="color: var(--text-muted); font-size: 0.9rem;">© 2026
            Project Casino. Simulator Only.</div>
    </footer>

    <!-- Logic -->
    <script>
        // Inline Auth logic for root verification
        window.CasinoAuth = {
            KEYS: { AGE_VERIFIED: 'casino_age_verified' },
            verifyAge: function (isAdult) {
                localStorage.setItem(this.KEYS.AGE_VERIFIED, isAdult ? 'true' : 'false');
                window.location.href = isAdult ? 'legal.html' : 'underage.html';
            }
        };

        // If already verified, go to next step
        if (localStorage.getItem(window.CasinoAuth.KEYS.AGE_VERIFIED) === 'true') {
            window.location.href = 'legal.html';
        }

        document.addEventListener('DOMContentLoaded', () => {
            // Background animation
            const bgCanvas = document.getElementById('bg-canvas');
            if (bgCanvas) {
                for (let i = 0; i < 15; i++) {
                    const p = document.createElement('div');
                    p.className = 'luxury-particle';
                    p.style.width = '3px'; p.style.height = '3px';
                    p.style.left = Math.random() * 100 + 'vw';
                    p.style.top = Math.random() * 100 + 'vh';
                    bgCanvas.appendChild(p);
                }
                anime({
                    targets: '.luxury-particle',
                    translateY: -50,
                    opacity: [0, 0.4, 0],
                    duration: function () { return anime.random(4000, 8000); },
                    loop: true,
                    easing: 'linear'
                });
            }

            // Form entrance
            anime({
                targets: '.verification-wrapper',
                scale: [0.9, 1],
                opacity: [0, 1],
                duration: 1000,
                easing: 'easeOutQuint'
            });
        });

        function handleAgeVerification(e) {
            e.preventDefault();

            const day = parseInt(document.getElementById('dob-day').value);
            const month = parseInt(document.getElementById('dob-month').value);
            const year = parseInt(document.getElementById('dob-year').value);
            const errorMsg = document.getElementById('error-msg');

            if (!day || !month || !year) {
                errorMsg.innerText = "Please fill out all fields.";
                return;
            }

            const today = new Date();
            const birthDate = new Date(year, month - 1, day);
            let age = today.getFullYear() - birthDate.getFullYear();
            const m = today.getMonth() - birthDate.getMonth();
            if (m < 0 || (m === 0 && today.getDate() < birthDate.getDate())) {
                age--;
            }

            // Animate button
            const btn = document.getElementById('verify-btn');
            anime({
                targets: btn,
                scale: [1, 0.95, 1],
                duration: 400,
                complete: () => {
                    const isAdult = age >= 18;
                    window.CasinoAuth.verifyAge(isAdult);
                }
            });
        }
    </script>
</body>

</html>
