<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Project Casino</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>
    <style>
        /* General Body */
        body {
            margin: 0;
            font-family: 'Arial', sans-serif;
            background: linear-gradient(to bottom, #0b0b0b, #1f1f1f);
            color: #f0f0f0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Navbar */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 2rem;
            background-color: #111;
            border-bottom: 2px solid #d4af37;
        }

        .nav-logo span {
            font-weight: bold;
            font-size: 1.5rem;
            color: #d4af37;
        }

        /* Main container */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 3rem 1rem;
            text-align: center;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            color: #d4af37;
        }

        p {
            font-size: 1.1rem;
            margin-bottom: 2rem;
            max-width: 600px;
            color: #ccc;
        }

        /* Form styling */
        .contact-form {
            background: rgba(20, 20, 20, 0.9);
            padding: 2rem;
            border-radius: 12px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.3);
        }

        .input-group {
            position: relative;
            margin-bottom: 1.5rem;
        }

        .input-field {
            width: 100%;
            padding: 12px 12px;
            border-radius: 6px;
            border: 1px solid #555;
            background: #111;
            color: #f0f0f0;
            outline: none;
            transition: all 0.3s ease;
        }

        .input-field:focus {
            border-color: #d4af37;
            box-shadow: 0 0 10px #d4af37;
        }

        .input-label {
            position: absolute;
            top: 50%;
            left: 12px;
            transform: translateY(-50%);
            color: #aaa;
            font-size: 0.9rem;
            pointer-events: none;
            transition: all 0.3s ease;
        }

        .input-field:focus+.input-label,
        .input-field:not(:placeholder-shown)+.input-label {
            top: -8px;
            left: 10px;
            font-size: 0.8rem;
            color: #d4af37;
            background: #111;
            padding: 0 4px;
        }

        button.submit-btn {
            width: 100%;
            padding: 12px;
            background: #d4af37;
            border: none;
            border-radius: 6px;
            color: #111;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        button.submit-btn:hover {
            background: #b58f2d;
            transform: scale(1.03);
        }

        /* Footer */
        footer {
            background: #111;
            text-align: center;
            padding: 1rem 0;
            border-top: 2px solid #d4af37;
            font-size: 0.9rem;
            color: #ccc;
        }

        footer a {
            color: #d4af37;
            text-decoration: none;
            margin: 0 0.5rem;
            transition: color 0.3s;
        }

        footer a:hover {
            color: #fff;
        }
    </style>
</head>

<body>
    <!-- Navbar -->
    <nav class="navbar">
        <a href="index.html" class="nav-logo">
            <span>CASINO</span>
        </a>
    </nav>

    <!-- Contact Form -->
    <main>
        <h1>24/7 Support</h1>
        <p>¿Tienes algún problema con la simulación? Envíanos un mensaje y nuestro equipo te ayudará rápidamente.</p>

        <form class="contact-form" id="contactForm">
            <div class="input-group">
                <input type="text" id="name" class="input-field" placeholder=" " required>
                <label for="name" class="input-label">Nombre</label>
            </div>

            <div class="input-group">
                <input type="email" id="email" class="input-field" placeholder=" " required>
                <label for="email" class="input-label">Correo Electrónico</label>
            </div>

            <div class="input-group">
                <textarea id="message" class="input-field" placeholder=" " rows="4" required></textarea>
                <label for="message" class="input-label">Mensaje</label>
            </div>

            <button type="submit" class="submit-btn">ENVIAR</button>
        </form>
    </main>

    <!-- Footer -->
    <footer>
        <a href="index.html">Lobby / Home</a> |
        <a href="advertense.html">Responsible Gaming</a>
        <div>© 2026 Project Casino. Simulator Only.</div>
    </footer>

    <script>
        // Animación suave al enviar
        const form = document.getElementById('contactForm');
        form.addEventListener('submit', function (e) {
            e.preventDefault();

            anime({
                targets: form,
                scale: [1, 0.97, 1],
                duration: 500,
                easing: 'easeInOutQuad'
            });

            alert("Mensaje enviado con éxito. ¡Gracias!");
            form.reset();
        });
    </script>
</body>

</html>
